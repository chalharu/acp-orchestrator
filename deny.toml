[advisories]
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "transitive through Leptos in the standalone frontend crate until upstream replaces paste" },
]
unused-ignored-advisory = "allow"

[bans]
multiple-versions = "allow"

[licenses]
version = 2
unused-allowed-license = "allow"
allow = [
  "AGPL-3.0-only",
  "Apache-2.0",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "LGPL-2.1-or-later",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[[licenses.exceptions]]
allow = ["CC0-1.0"]
crate = "base16"
