# yaml-language-server: $schema=https://raw.githubusercontent.com/chalharu/linter-service/refs/heads/main/.github/linter-service.schema.json
linters:
  cargo-coupling:
    # The current backend/frontend module graph carries pre-existing architectural
    # coupling that needs a dedicated refactor, not per-feature PR churn.
    disabled: true
  lizard:
    disabled: false
    languages:
      - rust
    thresholds:
      rust:
        cyclomatic_complexity: 10
        length: 50
  textlint:
    disabled: false
    preset_packages:
      - "textlint-rule-preset-ja-technical-writing@12.0.2"
      - "@textlint-ja/textlint-rule-preset-ai-writing@1.6.1"
