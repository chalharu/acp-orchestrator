# yaml-language-server: $schema=https://raw.githubusercontent.com/chalharu/linter-service/refs/heads/main/.github/linter-service.schema.json
linters:
  cargo-coupling:
    min_grade: C
    max_critical: 0
    max_circular: 0
  lizard:
    disabled: false
    languages:
      - rust
    thresholds:
      rust:
        cyclomatic_complexity: 10
        length: 50
  textlint:
    disabled: false
    preset_packages:
      - "textlint-rule-preset-ja-technical-writing@12.0.2"
      - "@textlint-ja/textlint-rule-preset-ai-writing@1.6.1"
