sonar.organization=chalharu
sonar.projectKey=chalharu_acp-orchestrator
sonar.projectName=acp-orchestrator
sonar.sources=src,crates
sonar.tests=tests,crates
sonar.test.inclusions=tests/**/*.rs,crates/**/tests/**/*.rs,crates/**/src/**/tests.rs,crates/**/src/**/tests/**/*.rs
sonar.exclusions=**/target/**,**/Cargo.lock
sonar.coverage.exclusions=\
  crates/acp-web-backend/src/agent_runtime.rs,\
  crates/acp-web-backend/src/agent_profiles.rs,\
  crates/acp-web-backend/src/server.rs,\
  crates/acp-web-backend/src/server/agent_profile_api.rs,\
  crates/acp-web-backend/src/server/session_api/read.rs,\
  crates/acp-web-backend/src/server/session_service.rs,\
  crates/acp-web-frontend/src/presentation/workspaces/registry.rs,\
  crates/acp-web-frontend/src/presentation/workspaces/route.rs,\
  crates/acp-web-frontend/src/presentation/workspaces/shared.rs
sonar.rust.lcov.reportPaths=coverage/lcov.info,coverage/frontend.lcov
