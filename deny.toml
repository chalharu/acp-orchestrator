[[licenses.exceptions]]
allow = ["AGPL-3.0-only"]
crate = "acp-mock"

[[licenses.exceptions]]
allow = ["AGPL-3.0-only"]
crate = "acp-orchestrator"

[[licenses.exceptions]]
allow = ["AGPL-3.0-only"]
crate = "acp-web-backend"
