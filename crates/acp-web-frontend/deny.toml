[advisories]
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "transitive through Leptos until upstream replaces paste" },
]
unused-ignored-advisory = "allow"

[bans]
multiple-versions = "allow"
wildcards = "deny"

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "BSL-1.0",
  "CC0-1.0",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[licenses.private]
ignore = true
ignore-sources = ["https://github.com/chalharu/acp-orchestrator"]

[[licenses.exceptions]]
allow = ["AGPL-3.0-only"]
crate = "acp-contracts"

[[licenses.exceptions]]
allow = ["AGPL-3.0-only"]
crate = "acp-web-frontend"

[[licenses.exceptions]]
allow = ["LGPL-2.1-or-later"]
crate = "r-efi"
